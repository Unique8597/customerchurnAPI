name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "event_listener/**"    # ← underscore, matches your actual folder

  workflow_dispatch:
    inputs:
      model_name:
        description: "Registered model name"
        required: true
      model_version:
        description: "Registered model version"
        required: true

env:
  PYTHON_VERSION: "3.11"
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: customerchurnapi-api

jobs:

  # ── Detect which folders changed ────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    # skip on workflow_dispatch — not needed there
    if: github.event_name == 'push'
    outputs:
      app:              ${{ steps.filter.outputs.app }}
      event_listener:   ${{ steps.filter.outputs.event_listener }}

    steps:
      - uses: actions/checkout@v4

      - name: Check changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - "app/**"
            event_listener:
              - "event_listener/**"

  # ── Deploy Azure Function ───────────────────────────────────────────────────
  deploy-function:
    name: Deploy Event Listener
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.event_listener == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r event_listener/requirements.txt \
            --target="event_listener/.python_packages/lib/site-packages"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Zip function package
        shell: bash
        run: |
          cd event_listener
          zip -r ../function.zip .
          cd ..

      - name: Deploy via Azure CLI
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az functionapp deployment source config-zip \
              --name ${{ secrets.FUNCTION_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --src function.zip \
              --build-remote true
              
  # ── Create Event Grid subscription AFTER function is deployed ──────────────
  setup-event-grid:
    name: Subscribe Event Grid to Model Registry
    runs-on: ubuntu-latest
    needs: [changes, deploy-function]
    if: |
      needs.changes.outputs.event_listener == 'true'

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Function App ID
        id: funcid
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            FUNC_ID=$(az functionapp show \
              --name ${{ secrets.FUNCTION_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --query id \
              --output tsv)
            echo "func_id=$FUNC_ID" >> $GITHUB_OUTPUT

      - name: Create Event Grid Subscription
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            EXISTING=$(az eventgrid event-subscription show \
              --name customerchurnapi-model-registered-sub \
              --source-resource-id ${{ secrets.AML_WORKSPACE_RESOURCE_ID }} \
              --query name \
              --output tsv 2>/dev/null || echo "")

            if [ -z "$EXISTING" ]; then
              echo "Creating Event Grid subscription..."
              az eventgrid event-subscription create \
                --name customerchurnapi-model-registered-sub \
                --source-resource-id ${{ secrets.AML_WORKSPACE_RESOURCE_ID }} \
                --included-event-types Microsoft.MachineLearningServices.ModelRegistered \
                --endpoint-type azurefunction \
                --endpoint ${{ steps.funcid.outputs.func_id }}/functions/model_registered_handler \
                --max-delivery-attempts 3 \
                --event-ttl 1440
            else
              echo "Event Grid subscription already exists, skipping..."
            fi

  # ── Build & Push Docker Image ───────────────────────────────────────────────
  build-image:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.app == 'true'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          echo "image_tag=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username:     ${{ secrets.ACR_USERNAME }}
          password:     ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push image with model baked in
        run: |
          docker build \
            --build-arg MODEL_NAME=${{ inputs.model_name || 'my-model' }} \
            --build-arg MODEL_VERSION=${{ inputs.model_version || '1' }} \
            --build-arg ARM_TENANT_ID=${{ secrets.ARM_TENANT_ID }} \
            --build-arg ARM_CLIENT_ID=${{ secrets.ARM_CLIENT_ID }} \
            --build-arg ARM_CLIENT_SECRET=${{ secrets.ARM_CLIENT_SECRET }} \
            --build-arg ARM_SUBSCRIPTION_ID=${{ secrets.ARM_SUBSCRIPTION_ID }} \
            --build-arg AZURE_RESOURCE_GROUP=${{ secrets.AZURE_RESOURCE_GROUP }} \
            --build-arg AML_WORKSPACE_NAME=${{ secrets.AML_WORKSPACE_NAME }} \
            -t ${{ steps.meta.outputs.image_tag }} \
            ./app

          docker push ${{ steps.meta.outputs.image_tag }}

  # ── Deploy to Container App ─────────────────────────────────────────────────
  deploy-api:
    name: Deploy API to Container App
    runs-on: ubuntu-latest
    needs: [changes, build-image]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.app == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ secrets.CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ needs.build-image.outputs.image_tag }}

      - name: Update model env vars (when triggered by event)
        if: github.event_name == 'workflow_dispatch'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ secrets.CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --set-env-vars \
                MODEL_NAME="${{ inputs.model_name }}" \
                MODEL_VERSION="${{ inputs.model_version }}"