name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "event_trigger/**"

  workflow_dispatch:
    inputs:
      model_name:
        description: "Registered model name"
        required: true
      model_version:
        description: "Registered model version"
        required: true

env:
  PYTHON_VERSION: "3.11"
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: customerchurnapi-api

jobs:

  # ── Build & Push Docker Image ───────────────────────────────
  build-image:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          echo "image_tag=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username:     ${{ secrets.ACR_USERNAME }}
          password:     ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push image with model baked in
        run: |
          docker build \
            --build-arg MODEL_NAME=${{ inputs.model_name || 'customerchurnmodel' }} \
            --build-arg MODEL_VERSION=${{ inputs.model_version || '2' }} \
            --build-arg ARM_TENANT_ID=${{ secrets.ARM_TENANT_ID }} \
            --build-arg ARM_CLIENT_ID=${{ secrets.ARM_CLIENT_ID }} \
            --build-arg ARM_CLIENT_SECRET=${{ secrets.ARM_CLIENT_SECRET }} \
            --build-arg ARM_SUBSCRIPTION_ID=${{ secrets.ARM_SUBSCRIPTION_ID }} \
            --build-arg AZURE_RESOURCE_GROUP=${{ secrets.AZURE_RESOURCE_GROUP }} \
            --build-arg AML_WORKSPACE_NAME=${{ secrets.AML_WORKSPACE_NAME }} \
            -t ${{ steps.meta.outputs.image_tag }} \
            ./app

          docker push ${{ steps.meta.outputs.image_tag }}

  # ── Deploy to Container App ──────────────────────────────────
  deploy-api:
    name: Deploy API to Container App
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              az containerapp update \
              --name ${{ secrets.CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/customerchurnapi-api:${{ needs.build-image.outputs.image_tag }} \
              --registry-server ${{ secrets.ACR_LOGIN_SERVER }} \
              --registry-username ${{ secrets.ACR_USERNAME }} \
              --registry-password ${{ secrets.ACR_PASSWORD }}

      - name: Update model env vars (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ secrets.CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --set-env-vars \
                MODEL_NAME="${{ inputs.model_name }}" \
                MODEL_VERSION="${{ inputs.model_version }}"