name: Provision Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/**"          # only runs when Terraform files change

  workflow_dispatch:        # manual trigger for first-time setup

env:
  TF_WORKING_DIR: ./infra
  ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
  
  # Needed for the azurerm backend to authenticate
  ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="github_token=${{ secrets.GH_PAT }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Push Terraform outputs to GitHub Secrets
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}   # needs repo + secrets scope
        run: |
          gh secret set ACR_LOGIN_SERVER \
            --body "$(terraform output -raw acr_login_server)"

          gh secret set ACR_USERNAME \
            --body "$(terraform output -raw acr_username)"

          gh secret set ACR_PASSWORD \
            --body "$(terraform output -raw acr_password)"

          gh secret set FUNCTION_APP_NAME \
            --body "$(terraform output -raw function_app_name)"

          gh secret set CONTAINER_APP_NAME \
            --body "$(terraform output -raw container_app_name)"